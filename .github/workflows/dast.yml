dast:
    runs-on: ubuntu-latest
    needs: bandit          # run AFTER your SAST job (use your job's actual name)
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start PyGoat
        run: |
          docker compose up -d
          sleep 30          # Django needs time to boot

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8000'
          cmd_options: '-a'
