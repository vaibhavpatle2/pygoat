name: CI

on: [push]

jobs:
 sast_scan:
   name: Run Bandit Scan
   runs-on: ubuntu-latest

   steps:
   - name: Checkout code
     uses: actions/checkout@v2

   - name: Set up Python
     uses: actions/setup-python@v2
     with:
       python-version: 3.8

   - name: Install Bandit
     run: pip install bandit

   # - name: Run Bandit Scan
   #   run: bandit -r . 
     
   - name: Run Bandit Scan
     run: bandit -ll -ii -r . -f json -o bandit-report.json || true

   - name: Upload Artifact
     uses: actions/upload-artifact@v4
     if: always()
     with:
      name: bandit-findings
      path: bandit-report.json

 dast:
     runs-on: ubuntu-latest
     needs: sast_scan      # run AFTER your SAST job (use your job's actual name)
     if: always()   
     permissions:
       contents: read
       issues: write
     steps:
       - name: Checkout
         uses: actions/checkout@v4
 
       - name: Build and start PyGoat
         run: |
           docker compose up -d
           sleep 30          # Django needs time to boot
           
       - name: Wait until PyGoat is ready
         run: |
               for i in $(seq 1 30); do
                 if curl -sSf http://localhost:8000 >/dev/null 2>&1; then
                   echo "PyGoat is up!"
                   exit 0
                 fi
                 echo "Waiting for PyGoat... ($i)"
                 sleep 3
               done
               echo "PyGoat did not start in time — dumping logs:"
               docker logs pygoat
               exit 1
               
       - name: OWASP ZAP Baseline Scan
         uses: zaproxy/action-baseline@v0.16.0
         with:
           token: ${{ secrets.GITHUB_TOKEN }}
           target: 'http://localhost:8000'
           cmd_options: '-a'
 
 
    
 
    
